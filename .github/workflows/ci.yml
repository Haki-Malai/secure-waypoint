name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: secure_waypoint-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d secure_waypoint-test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      ENVIRONMENT: testing
      DEBUG: false
      SECRET_KEY: ci-test-secret
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: secure_waypoint
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install

      - name: Ruff
        run: poetry run ruff check .

      - name: Ruff docstrings
        run: poetry run ruff check core app/controllers app/repositories cli main.py --select D102,D103,D419

      - name: Black
        run: poetry run pre-commit run black --all-files

      - name: Pytest
        run: |
          poetry run coverage run -m pytest
          poetry run coverage report
